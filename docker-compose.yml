services:

  relay:
    build: .
    container_name: diabdata-relay
    restart: unless-stopped
    expose:
      - "8080"
    mem_limit: 512m
    networks:
      - relay-net

  nginx:
    image: nginx:latest
    container_name: diabdata-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - relay
    networks:
      - relay-net

networks:
  relay-net:
    driver: bridge